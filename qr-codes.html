<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Codes — Hochzeitseinladungen</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs2@0.0.2/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f5;
      padding: 40px 20px;
    }
    h1 {
      text-align: center;
      font-size: 1.6rem;
      margin-bottom: 8px;
      color: #333;
    }
    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 32px;
      font-size: 0.9rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px 16px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      page-break-inside: avoid;
      break-inside: avoid;
    }
    .card .qr-wrap {
      display: inline-block;
      margin: 0 auto 12px;
    }
    .card canvas, .card .qr-wrap img {
      display: block;
    }
    .card .inv-id {
      font-size: 0.7rem;
      color: #bbb;
      margin-bottom: 4px;
      font-family: monospace;
    }
    .card .names {
      font-size: 0.95rem;
      font-weight: 600;
      color: #3D5044;
      margin-bottom: 4px;
    }
    .card .url {
      font-size: 0.65rem;
      color: #aaa;
      word-break: break-all;
    }
    @media print {
      @page { margin: 10mm; }
      body { background: white; padding: 0; }
      h1, .subtitle { margin-bottom: 10mm; }
      .grid {
        gap: 8mm 6mm;
        grid-template-columns: repeat(4, 1fr);
      }
      .card {
        box-shadow: none;
        border: none;
        padding: 0;
      }
      /* Force each QR to exactly 40mm x 40mm */
      .card .qr-wrap {
        width: 40mm;
        height: 40mm;
        margin: 0 auto 2mm;
      }
      .card .qr-wrap img,
      .card .qr-wrap canvas {
        width: 40mm !important;
        height: 40mm !important;
        display: block;
      }
      .card .inv-id { font-size: 8pt; margin-bottom: 1mm; }
      .card .names { font-size: 10pt; margin-bottom: 1mm; }
      .card .url { font-size: 6.5pt; }
    }
  </style>
</head>
